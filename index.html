<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MonkeyOS WebGPU Microkernel</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: #141e2e;
        color: #0f0;
        font-family: monospace;
      }
      #os-canvas {
        display: block;
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 10;
        pointer-events: auto;
      }
      #boot-console {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        padding: 20px;
        box-sizing: border-box;
        z-index: 2;
        pointer-events: none;
        white-space: pre-wrap;
        overflow-y: auto;
      }
      .cursor {
        background-color: #0f0;
        color: #000;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { background-color: #0f0; color: #000; }
        50% { background-color: transparent; color: #0f0; }
      }
    </style>
  </head>
  <body>
    <canvas id="os-canvas"></canvas>
    <div id="boot-console"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
